<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar Square · CPV Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  /* ── Solar Square brand palette ── */
  --ss-navy:   #1A237E;   /* deep navy — primary brand */
  --ss-navy-2: #283593;   /* slightly lighter navy */
  --ss-amber:  #F5A623;   /* signature amber/gold */
  --ss-amber-2:#FFC84A;   /* lighter amber */
  --ss-sky:    #EEF4FB;   /* light sky background */
  --ss-sky-2:  #DDEAF8;   /* slightly deeper sky */
  --ss-sky-3:  #C9DDEF;   /* border / divider */

  /* ── Semantic aliases ── */
  --bg:        var(--ss-sky);
  --bg-2:      var(--ss-sky-2);
  --bg-3:      var(--ss-sky-3);
  --ink:       #0D1B3E;
  --ink-2:     #2C3E6B;
  --ink-3:     #6278A0;
  --ink-4:     #9AAAC4;
  --line:      #D4E1F0;
  --line-2:    #B8CCE4;
  --accent:    var(--ss-navy);
  --accent-2:  var(--ss-navy-2);
  --accent-soft:#DDE5F8;
  --warn:      var(--ss-amber);
  --warn-soft: #FFF3D0;
  --danger:    #D63031;
  --danger-soft:#FDEAEB;
  --good:      #00897B;
  --good-soft: #C8F0EC;
  --b2b:       #5E35B1;
  --b2b-soft:  #EDE7F6;
  --maxw:1380px;
}

html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
body{font-size:14px;line-height:1.5}

/* ── TOP NAVBAR (Solar Square style) ── */
.ss-topnav{
  background:var(--ss-navy);
  padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(26,35,126,.25);
}
.ss-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.ss-logo-icon{width:auto;height:40px;object-fit:contain}
.ss-logo-text{display:flex;flex-direction:column;line-height:1.05}
.ss-logo-text .l1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.01em}
.ss-logo-text .l2{font-size:10px;font-weight:500;color:var(--ss-amber);letter-spacing:.08em;text-transform:uppercase}
.ss-nav-title{color:rgba(255,255,255,.7);font-size:13px;font-weight:500;letter-spacing:.02em}
.ss-nav-badge{background:var(--ss-amber);color:var(--ss-navy);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}

.wrap{max-width:var(--maxw);margin:0 auto;padding:28px 28px 80px}

/* ── HEADER UNDER NAV ── */
.top{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 0 20px;border-bottom:2px solid var(--ss-amber);margin-bottom:28px}
.top-left .eye{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ss-amber);margin-bottom:6px}
.top h1{font-size:26px;font-weight:800;letter-spacing:-.03em;margin:0;color:var(--ss-navy)}
.top h1 em{font-style:normal;color:var(--ss-amber)}
.top .meta{text-align:right;font-size:11.5px;color:var(--ink-3);font-family:'JetBrains Mono',monospace;padding-top:4px}
.top .meta .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--good);margin-right:6px;vertical-align:middle;box-shadow:0 0 0 3px rgba(0,137,123,.2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(0,137,123,.2)}50%{box-shadow:0 0 0 7px rgba(0,137,123,.05)}}
.top .meta .dot.off{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,.2);animation:none}

/* ── TABS (amber underline style) ── */
.tabs{display:flex;gap:0;margin-top:16px;border-bottom:2px solid var(--line);width:fit-content}
.tab{padding:9px 18px;font-size:12.5px;font-weight:600;color:var(--ink-3);background:transparent;border:0;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;font-family:inherit;letter-spacing:.02em;text-transform:uppercase;transition:all .15s}
.tab.active{color:var(--ss-navy);border-bottom-color:var(--ss-amber)}
.tab:hover:not(.active){color:var(--ss-navy-2)}

/* ── EYE (section label) ── */
.eye{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ss-amber);margin-bottom:4px}

/* ── HERO KPIs ── */
.hero{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-bottom:40px;box-shadow:0 2px 8px rgba(26,35,126,.06)}
.hero .stat{padding:24px 20px;border-right:1px solid var(--line);background:#fff;position:relative;cursor:default;transition:background .15s}
.hero .stat:last-child{border-right:0}
.hero .stat:hover{background:var(--ss-sky)}
.hero .stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--ink-3);font-weight:600;margin-bottom:8px}
.hero .stat .val{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;color:var(--ss-navy)}
.hero .stat .val .cur{font-size:20px;font-weight:600;color:var(--ss-amber);margin-right:2px}
.hero .stat .val .unit{font-size:14px;color:var(--ink-3);font-weight:400;margin-left:3px}
.hero .stat .sub{margin-top:10px;font-size:11px;color:var(--ink-3);display:flex;gap:10px;flex-wrap:wrap}
.hero .stat .sub b{color:var(--ink-2);font-weight:600}
.hero .stat.headline{background:var(--ss-navy)}
.hero .stat.headline .lbl{color:var(--ss-amber)}
.hero .stat.headline .val{color:#fff}
.hero .stat.headline .val .cur{color:var(--ss-amber)}
.hero .stat.headline .sub{color:rgba(255,255,255,.6)}
.hero .stat.headline .sub b{color:#fff}

/* ── SECTIONS ── */
.section{margin:44px 0 0}
.section h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px;color:var(--ss-navy)}
.section .lead{font-size:13px;color:var(--ink-3);margin-bottom:24px;max-width:680px;line-height:1.65}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:stretch}
.grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* ── CARD ── */
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:0 1px 4px rgba(26,35,126,.05)}
.card h3{font-size:13.5px;font-weight:700;margin:0 0 3px;color:var(--ss-navy);letter-spacing:-.005em}
.card .desc{font-size:11.5px;color:var(--ink-3);margin-bottom:18px;line-height:1.5}
.chart-box{position:relative;height:280px}

/* ── COST TILE ── */
.cost-tile{padding:16px 18px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(26,35,126,.04)}
.cost-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ss-amber)}
.cost-tile .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);font-weight:600;margin-bottom:6px;margin-top:4px}
.cost-tile .val{font-size:19px;font-weight:700;letter-spacing:-.015em;font-variant-numeric:tabular-nums;color:var(--ss-navy)}
.cost-tile .pct{font-size:11px;color:var(--ink-3);margin-top:5px;font-family:'JetBrains Mono',monospace}
.cost-tile .bar-track{margin-top:10px;height:4px;background:var(--bg-2);border-radius:2px;overflow:hidden}
.cost-tile .bar-track > i{display:block;height:100%;border-radius:2px}

/* ── STACKED BAR ── */
.stack{display:flex;height:44px;border-radius:8px;overflow:hidden;background:var(--bg-2);margin:8px 0 16px}
.stack > div{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;min-width:0;transition:opacity .15s;cursor:default}
.stack > div:hover{opacity:.82}
.stack-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--ink-2);margin-top:12px}
.stack-legend .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

/* ── RANK LIST ── */
.rank-list{display:flex;flex-direction:column;gap:7px}
.rank-item{display:grid;grid-template-columns:20px 1fr auto;align-items:center;gap:12px;padding:9px 13px;border-radius:8px;background:var(--bg-2);font-size:13px;transition:background .12s;border-left:3px solid transparent}
.rank-item:hover{background:var(--bg-3)}
.rank-item .pos{font-family:'JetBrains Mono',monospace;color:var(--ink-3);font-size:10.5px}
.rank-item .name{font-weight:600;color:var(--ink)}
.rank-item .val{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ss-navy)}
.rank-item .val .unit{color:var(--ink-3);font-weight:400;font-size:11px;margin-left:2px}
.rank-item.bad{background:linear-gradient(90deg,var(--danger-soft) 0%,transparent 70%);border-left-color:var(--danger)}
.rank-item.good{background:linear-gradient(90deg,var(--good-soft) 0%,transparent 70%);border-left-color:var(--good)}

/* ── TABLE ── */
.tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(26,35,126,.05)}
.tbl-head{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);background:var(--ss-navy)}
.tbl-head h3{margin:0;font-size:14px;font-weight:700;color:#fff}
.tbl-head .controls{display:flex;gap:8px;align-items:center}
.search{padding:7px 11px;font-size:12px;border:1px solid var(--line);border-radius:6px;background:#fff;font-family:inherit;width:200px;outline:none;transition:all .15s}
.search:focus{border-color:var(--ss-amber);box-shadow:0 0 0 3px rgba(245,166,35,.2)}
table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
thead th{text-align:right;padding:11px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3);font-weight:700;background:var(--ss-sky-2);border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap;transition:color .12s}
thead th:first-child{text-align:left}
thead th:hover{color:var(--ss-navy)}
thead th.sorted{color:var(--ss-navy);font-weight:800}
thead th.sorted::after{content:" ↓"}
thead th.sorted.asc::after{content:" ↑"}
tbody td{padding:10px 13px;text-align:right;border-bottom:1px solid var(--line);color:var(--ink-2)}
tbody td:first-child{text-align:left;color:var(--ink);font-weight:600}
tbody tr:hover{background:var(--ss-sky)}
tbody tr:last-child td{border-bottom:0}
.barcell{position:relative;display:inline-block;width:60px;height:5px;background:var(--bg-2);border-radius:3px;margin-left:8px;vertical-align:middle;overflow:hidden}
.barcell > i{display:block;height:100%;background:var(--ss-navy);border-radius:3px}
.chip{display:inline-block;padding:2px 8px;font-size:10.5px;border-radius:4px;font-weight:600;letter-spacing:.02em}
.chip.b2b{background:var(--b2b-soft);color:var(--b2b)}
.chip.warn{background:var(--warn-soft);color:#7a5000}
.chip.good{background:var(--good-soft);color:#004D45}
.chip.bad{background:var(--danger-soft);color:#991B1B}

/* ── SH TABLE ── */
.sh-tbl{width:max-content;border-collapse:collapse;font-size:11.5px;font-variant-numeric:tabular-nums}
.sh-tbl thead th{position:sticky;top:0;z-index:2;background:var(--ss-sky-2);padding:8px 6px;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
.sh-tbl thead th.sticky-l{z-index:4}
.sh-tbl thead th.day-h.hl{background:rgba(245,166,35,.2);color:var(--ss-navy)}
.sh-tbl tbody td{padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
.sh-tbl tbody td.sticky-l{position:sticky;left:0;z-index:1;border-right:1px solid var(--line)}
.sh-tbl tbody td.day-c{min-width:30px;color:var(--ink-4)}
.sh-tbl tbody td.day-c.has{background:var(--good-soft);color:#004D45;font-weight:600}
.sh-tbl tbody td.day-c.hl{background:rgba(245,166,35,.15);color:var(--ss-navy);font-weight:600}
.sh-tbl tbody td.day-c.has.hl{background:rgba(245,166,35,.3);color:#6B3A00}
.sh-tbl tbody tr:hover td{background:var(--ss-sky)}
.sh-tbl tbody tr:hover td.sticky-l{background:var(--ss-sky) !important}
.sh-tbl tbody tr:hover td.day-c.has{background:#9FE0D8}

/* ── SECTION DIVIDER ── */
.ss-divider{height:3px;background:linear-gradient(90deg,var(--ss-amber) 0%,var(--ss-navy) 100%);border-radius:2px;margin:40px 0 0}

/* ── FOOTER ── */
.foot{margin-top:60px;padding:20px 0 0;border-top:2px solid var(--ss-amber);font-size:11px;color:var(--ink-3);display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace}
.foot strong{color:var(--ss-navy)}

/* ── LOADING ── */
.loading{padding:60px;text-align:center;color:var(--ink-3);font-size:14px}
.loading .spin{display:inline-block;width:20px;height:20px;border:2px solid var(--bg-2);border-top-color:var(--ss-amber);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FILTER BAR ── */
.filter-bar select,.filter-bar input{border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--ss-amber);box-shadow:0 0 0 3px rgba(245,166,35,.2)}

/* ── DEEP DIVE / CITY IQ ── */
.sh-profile-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(26,35,126,.06)}
.sh-profile-card .sh-name{font-size:22px;font-weight:800;color:var(--ss-navy);letter-spacing:-.02em;margin:0 0 4px}
.sh-profile-card .sh-meta{font-size:12px;color:var(--ink-3);margin-bottom:18px}
.kpi-band{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:18px 0}
.kpi-mini{padding:14px 16px;border-radius:8px;background:var(--bg-2);border-left:3px solid var(--ss-amber)}
.kpi-mini .k-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);font-weight:600;margin-bottom:4px}
.kpi-mini .k-val{font-size:20px;font-weight:700;color:var(--ss-navy);font-variant-numeric:tabular-nums}
.kpi-mini .k-sub{font-size:11px;color:var(--ink-3);margin-top:2px}
.day-spark{display:flex;gap:2px;align-items:flex-end;height:48px;margin-top:12px}
.day-spark .bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;background:var(--ss-navy);opacity:.7;transition:opacity .1s}
.day-spark .bar:hover{opacity:1}
.rating-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:.02em}
.rating-pill.star{background:var(--good-soft);color:var(--good)}
.rating-pill.ok{background:var(--warn-soft);color:#7a5000}
.rating-pill.needs{background:var(--danger-soft);color:var(--danger)}

/* City IQ */
.city-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px;box-shadow:0 2px 8px rgba(26,35,126,.06);margin-bottom:20px}
.city-card h3{font-size:16px;font-weight:800;color:var(--ss-navy);margin:0 0 4px}
.city-card .city-meta{font-size:12px;color:var(--ink-3);margin-bottom:14px}
.factor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:12px}
.factor-chip{padding:10px 14px;border-radius:8px;background:var(--bg-2);font-size:12px}
.factor-chip .f-label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3);font-weight:600;margin-bottom:4px}
.factor-chip .f-val{font-weight:700;color:var(--ink)}
.factor-chip.pos{background:var(--good-soft);border-left:3px solid var(--good)}
.factor-chip.neg{background:var(--danger-soft);border-left:3px solid var(--danger)}
.factor-chip.neu{background:var(--bg-2);border-left:3px solid var(--line)}
.ai-insight{background:linear-gradient(135deg,var(--accent-soft) 0%,#EDF1FC 100%);border:1px solid var(--line-2);border-radius:10px;padding:18px 20px;margin-top:16px;font-size:13px;color:var(--ink-2);line-height:1.7}
.ai-insight .ai-icon{font-size:16px;margin-right:8px}
.ai-insight strong{color:var(--ss-navy)}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--ink-3);font-size:13px;padding:16px}
.ai-loading .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--bg-3);border-top-color:var(--ss-amber);border-radius:50%;animation:spin .7s linear infinite}

@media (max-width:1100px){
  .hero{grid-template-columns:repeat(3,1fr)}
  .hero .stat:nth-child(3){border-right:0}
  .grid-6{grid-template-columns:repeat(3,1fr)}
}
@media (max-width:760px){
  .hero{grid-template-columns:repeat(2,1fr)}
  .hero .stat{border-right:0;border-bottom:1px solid var(--line)}
  .grid-2,.grid-2-eq,.grid-3,.grid-4,.grid-6{grid-template-columns:1fr}
  .wrap{padding:16px 14px 60px}
  .ss-topnav{padding:0 14px}
}
</style>
</head>
<body>

// FETCH + RENDER
// ═════════════════════════════════════════════════════════════════════════════
let DATA = null;

async function loadData() {
  if (!WEB_APP_URL) {
    DATA = FALLBACK_DATA;
    setStatus("PREVIEW MODE", "embedded fallback · paste web app URL to go live", true);
    return;
  }
  try {
    setStatus("LOADING…", "fetching from sheet", false);
    const res = await fetch(WEB_APP_URL, { redirect: "follow" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    setStatus("LIVE", "as of " + (json.meta && json.meta.asOf ? new Date(json.meta.asOf).toLocaleString() : "now"), false);
  } catch (e) {
    DATA = FALLBACK_DATA;
    setStatus("OFFLINE", "fetch failed — showing fallback", true);
    console.error(e);
  }
}

function setStatus(text, detail, isOffline) {
  document.getElementById("status-dot").classList.toggle("off", !!isOffline);
  document.getElementById("status-text").textContent = text;
  document.getElementById("status-detail").textContent = detail;
}

// FORMATTERS
// ═════════════════════════════════════════════════════════════════════════════
const inr = n => new Intl.NumberFormat("en-IN").format(Math.round(n));
const inrShort = n => {
  n = +n || 0;
  if (n >= 1e7) return (n / 1e7).toFixed(2) + " Cr";
  if (n >= 1e5) return (n / 1e5).toFixed(2) + " L";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + " K";
  return inr(n);
};
const pct = (a, b) => (b ? (a / b * 100).toFixed(1) : "0") + "%";
const round = (n, d=0) => +(+n || 0).toFixed(d);

function renderQuadrant() {

  const byCpvWorst = [...DATA.clusters].filter(c => c.cpvPM > 0).sort((a,b) => b.cpvPM - a.cpvPM).slice(0, 10);
  const byCpvBest  = [...DATA.clusters].filter(c => c.cpvPM > 0).sort((a,b) => a.cpvPM - b.cpvPM).slice(0, 10);

      </div>
    </div>

        </div>

        <div class="card">
          <h3>Most efficient (cheapest CPV)</h3>
          <div class="desc">CPV — PM (lowest first)</div>
          <div class="rank-list">${byCpvBest.map((c,i) => `
            <div class="rank-item good">

            </div>`).join("")}</div>
        </div>

        <div class="card">
          <h3>Top productivity</h3>
          <div class="desc">V/Day Blended (highest first)</div>
          <div class="rank-list">${byVDayBest.map((c,i) => `

              <span class="pos">${i+1}</span>
              <span class="name">${c.cluster}</span>
              <span class="val">${(c.vDayBlended||0).toFixed(1)}<span class="unit"> v/day</span></span>

  document.getElementById("app").innerHTML = html;

    .filter(c => c.cpvPM > 0)
    .map(c => ({ cluster: c.cluster, cpv: c.cpvPM, diff: c.cpvPM - avg, cost: c.totalCost, visits: c.totalVisits, shs: c.activeShB2C || 0 }))
    .sort((a,b) => a.diff - b.diff);  // cheapest (most negative) at top

  charts.quadrant = new Chart(ctx, {
    type: "bar",

      labels: ranked.map(r => r.cluster),

        },
        y: {
          ticks: { color: "#0F1419", font: { size: 11, weight: "500" } },
          grid: { display: false }
        }
      }
    }
  });
}

let tblState = { sort: "cpvBlended", asc: false, q: "" };

function renderClusters() {
  const html = `
    <div class="section" style="margin-top:0">
      <div class="eye">Cluster detail</div>
      <h2>Every cluster, every metric</h2>
      <p class="lead">All ${DATA.clusters.length} clusters with their cost components, visit counts, and CPV. Click any column header to sort. Search filters by name.</p>

      <div class="tbl-wrap">
        <div class="tbl-head">
          <h3>Cluster table</h3>
          <div class="controls">
            <input class="search" id="search" placeholder="Search cluster…" />
          </div>
        </div>
        <div style="overflow-x:auto">
          <table id="tbl">
            <thead><tr>
              <th data-k="cluster">Cluster</th>
              <th data-k="activeSH">SHs</th>
              <th data-k="totalVisits">Visits</th>
              <th data-k="pmDone">PM</th>
              <th data-k="cm">CM</th>
              <th data-k="salaryCost">Salary</th>
              <th data-k="reimbCost">Reimb</th>
              <th data-k="toolkitCost">Toolkit</th>
              <th data-k="schedulerCost">Sched</th>
              <th data-k="bikeCost">Bike</th>
              <th data-k="totalCost">Total cost</th>
              <th data-k="vDayPM">V/Day PM</th>
              <th data-k="vDayBlended">V/Day Bld</th>
              <th data-k="cpvPM">CPV·PM</th>
              <th data-k="cpvBlended">CPV·Bld</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  document.getElementById("app").innerHTML = html;

  renderTblBody();
  document.querySelectorAll("thead th").forEach(th => {
    th.addEventListener("click", () => {
      if (tblState.sort === th.dataset.k) tblState.asc = !tblState.asc;
      else { tblState.sort = th.dataset.k; tblState.asc = false; }
      renderTblBody();
    });
  });
  document.getElementById("search").addEventListener("input", e => {
    tblState.q = e.target.value.toLowerCase().trim();
    renderTblBody();
  });
}

function renderTblBody() {
  const tbody = document.getElementById("tbody");
  const max = {
    activeShB2C: Math.max(...DATA.clusters.map(c => c.activeShB2C || 0), 1),
    totalCost:   Math.max(...DATA.clusters.map(c => c.totalCost || 0), 1),
    cpvBlended:  Math.max(...DATA.clusters.map(c => c.cpvBlended || 0), 1),
    totalVisits: Math.max(...DATA.clusters.map(c => c.totalVisits || 0), 1),
  };

  const filtered = DATA.clusters.filter(c => c.cluster.toLowerCase().includes(tblState.q));
  filtered.sort((a, b) => {
    let va = a[tblState.sort], vb = b[tblState.sort];
    if (typeof va === "string") return tblState.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    va = +va || 0; vb = +vb || 0;
    return tblState.asc ? va - vb : vb - va;
  });

  const bar = (v, m, color) => v > 0 ? `<span class="barcell"><i style="width:${(v/m*100).toFixed(1)}%;background:${color||'var(--accent)'}"></i></span>` : "";

  tbody.innerHTML = filtered.map(c => {
    const cpvClass = c.cpvBlended > DATA.totals.cpvBlended * 1.3 ? "bad" : c.cpvBlended < DATA.totals.cpvBlended * 0.7 && c.cpvBlended > 0 ? "good" : "";
    return `<tr>
      <td>${c.cluster}</td>
      <td>${c.activeShB2C||0}${bar(c.activeShB2C||0, max.activeShB2C)}</td>
      <td>${inr(c.totalVisits||0)}</td>
      <td>${inr(c.pmDone||0)}</td>
      <td>${inr(c.cm||0)}</td>
      <td>₹${inrShort(c.salaryCost||0)}</td>
      <td>₹${inrShort(c.reimbCost||0)}</td>
      <td>₹${inrShort(c.toolkitCost||0)}</td>
      <td>₹${inrShort(c.schedulerCost||0)}</td>
      <td>₹${inrShort(c.bikeCost||0)}</td>
      <td>₹${inr(c.totalCost||0)}${bar(c.totalCost||0, max.totalCost)}</td>
      <td>${(c.vDayPM||0).toFixed(2)}</td>
      <td>${(c.vDayBlended||0).toFixed(2)}</td>
      <td>${c.cpvPM > 0 ? "₹" + inr(c.cpvPM) : "—"}</td>
      <td>${c.cpvBlended > 0 ? `<span class="chip ${cpvClass}">₹${inr(c.cpvBlended)}</span>` : "—"}</td>
    </tr>`;
  }).join("");

  document.querySelectorAll("thead th").forEach(th => {
    th.classList.toggle("sorted", th.dataset.k === tblState.sort);
    th.classList.toggle("asc", th.dataset.k === tblState.sort && tblState.asc);
  });
}

  document.getElementById('app').innerHTML = html;

  document.getElementById('sh-cluster').addEventListener('change', e => {
    st.cluster = e.target.value;
    redrawSH(mode);
  });
  document.getElementById('sh-name').addEventListener('input', e => {
    st.name = e.target.value.trim().toLowerCase();
    redrawSH(mode);
  });
  document.getElementById('sh-date-from').addEventListener('change', e => {
    st.dateFrom = e.target.value ? +e.target.value : null;
    redrawSH(mode);
  });
  document.getElementById('sh-date-to').addEventListener('change', e => {
    st.dateTo = e.target.value ? +e.target.value : null;
    redrawSH(mode);
  });
  document.getElementById('sh-day').addEventListener('change', e => {
    st.day = e.target.value ? +e.target.value : null;
    redrawSH(mode);
  });

  redrawSH(mode);
}

function redrawSH(mode) {
  const rows = mode === 'pm' ? DATA.shDailyPM : DATA.shDailyAll;
  const daysInMonth = DATA.meta.daysInMonth || 30;
  const isPM = mode === 'pm';
  const st = shState[mode];

  let filtered = st.cluster === 'all' ? rows : rows.filter(r => r.cluster === st.cluster);
  if (st.name) filtered = filtered.filter(r => r.name.toLowerCase().includes(st.name));
  // Apply date range — slice days array for metrics
  const dayFrom = st.dateFrom ? st.dateFrom - 1 : 0;
  const dayTo   = st.dateTo   ? st.dateTo        : daysInMonth;
  const sliceDays = (days) => days.slice(dayFrom, dayTo);

  // aggregates — respect date range
  const totalVisits = filtered.reduce((s,r) => s + sliceDays(r.days).reduce((a,b)=>a+b,0), 0);
  const totalSecondary = filtered.reduce((s,r) => s + (r.secondary||0), 0);
  const activeShs = filtered.length;
  const avgPerSH = activeShs ? (totalVisits/activeShs).toFixed(1) : '0';
  const dayTotals = Array(daysInMonth).fill(0);
  filtered.forEach(r => r.days.forEach((v,d) => { if (d < daysInMonth) dayTotals[d] += v; }));
  let peakDay = 1, peakVal = 0;
  dayTotals.forEach((v,i) => { if (v > peakVal) { peakVal = v; peakDay = i+1; } });
  const totalPM = isPM ? totalVisits : filtered.reduce((s,r) => s + (r.pm||0), 0);
  const totalCM = isPM ? 0 : filtered.reduce((s,r) => s + (r.cm||0), 0);

  // KPIs
  const kpiHtml = `
    <div class="grid-4" style="margin-bottom:0">
      <div class="cost-tile"><div class="lbl">${isPM ? 'PM visits MTD' : 'Total visits MTD'}</div><div class="val">${inr(totalVisits)}</div><div class="pct">${activeShs} SHs · ${totalSecondary} sec.</div></div>
      <div class="cost-tile"><div class="lbl">Avg per SH</div><div class="val">${avgPerSH}</div><div class="pct">visits / SH</div></div>
      <div class="cost-tile"><div class="lbl">Peak day</div><div class="val">${inr(peakVal)}</div><div class="pct">on day ${peakDay}</div></div>
      ${isPM
        ? `<div class="cost-tile"><div class="lbl">Active SHs</div><div class="val">${activeShs}</div><div class="pct">in dump this month</div></div>`
        : `<div class="cost-tile"><div class="lbl">PM / CM split</div><div class="val">${inr(totalPM)} / ${inr(totalCM)}</div><div class="pct">PM &middot; CM</div></div>`
      }
    </div>
  `;
  document.getElementById('sh-kpi').innerHTML = kpiHtml;
  document.getElementById('sh-summary').textContent = `${activeShs} SHs shown · ${inr(totalVisits)} visits${st.cluster !== 'all' ? ' · ' + st.cluster : ''}`;

  // table
  const dayHeaders = Array.from({length: daysInMonth}, (_,i) => i+1);
  const summaryHeaders = isPM
    ? ['MTD', 'Days', 'Sec']
    : ['PM', 'CM', 'Total', 'Days', 'Sec'];

  const headHtml = `<thead><tr>
    <th class="sticky-l" style="text-align:left;left:0;z-index:3;background:var(--bg-2)">SH name</th>
    <th class="sticky-l" style="text-align:left;left:180px;z-index:3;background:var(--bg-2)">Cluster</th>
    <th style="text-align:center">Type</th>
    ${dayHeaders.map(d => `<th class="day-h ${st.day === d ? 'hl' : ''}" style="text-align:center;padding:8px 6px;min-width:30px">${d}</th>`).join('')}
    ${summaryHeaders.map(h => `<th style="text-align:right;padding:12px 10px">${h}</th>`).join('')}
  </tr></thead>`;

  const dailyRow = `<tr style="background:#D8EAF8;font-weight:600">
    <td class="sticky-l" style="left:0;z-index:2;background:#D8EAF8;text-align:left">Daily total</td>
    <td class="sticky-l" style="left:180px;z-index:2;background:#D8EAF8;"></td>
    <td style="text-align:center">${activeShs} SHs</td>
    ${dayTotals.map((v,i) => `<td class="day-c ${st.day === i+1 ? 'hl' : ''}" style="text-align:center;color:#0C447C">${v || ''}</td>`).join('')}
    ${isPM
      ? `<td style="text-align:right;font-weight:700">${inr(totalVisits)}</td><td></td><td style="text-align:right">${totalSecondary}</td>`
      : `<td style="text-align:right">${inr(totalPM)}</td><td style="text-align:right">${inr(totalCM)}</td><td style="text-align:right;font-weight:700">${inr(totalVisits)}</td><td></td><td style="text-align:right">${totalSecondary}</td>`
    }
  </tr>`;

  const bodyRows = filtered.map(r => {
    const dayCells = r.days.slice(0, daysInMonth).map((v,i) => {
      const isHl = st.day === i+1;
      const hasV = v > 0;
      const cls = ['day-c'];
      if (isHl) cls.push('hl');
      if (hasV) cls.push('has');
      return `<td class="${cls.join(' ')}" style="text-align:center">${v || ''}</td>`;
    }).join('');
    return `<tr>
      <td class="sticky-l" style="left:0;z-index:1;text-align:left;background:#fff;font-weight:500">${r.name}</td>
      <td class="sticky-l" style="left:180px;z-index:1;text-align:left;background:#fff;color:var(--ink-3)">${r.cluster}</td>
      <td style="text-align:center"><span class="chip ${r.type === 'Vendor' ? 'warn' : ''}">${r.type}</span></td>
      ${dayCells}
      ${isPM
        ? `<td style="text-align:right;font-weight:600">${r.total}</td><td style="text-align:right;color:var(--ink-3)">${r.daysActive}</td><td style="text-align:right;color:${r.secondary > 0 ? 'var(--accent)' : 'var(--ink-4)'}">${r.secondary || ''}</td>`
        : `<td style="text-align:right">${r.pm||0}</td><td style="text-align:right">${r.cm||0}</td><td style="text-align:right;font-weight:600">${r.total}</td><td style="text-align:right;color:var(--ink-3)">${r.daysActive}</td><td style="text-align:right;color:${r.secondary > 0 ? 'var(--accent)' : 'var(--ink-4)'}">${r.secondary || ''}</td>`
      }
    </tr>`;
  }).join('');

  document.getElementById('sh-tbl-wrap').innerHTML = `<table class="sh-tbl">${headHtml}<tbody>${dailyRow}${bodyRows}</tbody></table>`;
}

function renderDDResults(rows) {
  const container = document.getElementById('dd-results');
  if (!rows.length) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--ink-3);font-size:14px">Type at least 2 characters to search, or select a cluster.</div>`;
    return;
  }

  const daysInMonth = DATA.meta.daysInMonth || 30;
  const overallAvgPM = DATA.totals.cpvPM || 0;
  const T = DATA.totals;

  container.innerHTML = rows.slice(0, 10).map(r => {
    const total = r.total || 0;
    const pm = r.pm || 0;
    const cm = r.cm || 0;
    const daysActive = r.daysActive || 1;
    const secondary = r.secondary || 0;
    const vPerDay = daysActive > 0 ? (total / daysActive).toFixed(1) : 0;
    const pmPct = total > 0 ? ((pm / total) * 100).toFixed(0) : 0;

    // Find cluster data for context
    const clusterData = DATA.clusters.find(c => c.cluster === r.cluster) || {};
    const clusterCpvPM = clusterData.cpvPM || 0;

    // Rating logic: based on visits/day vs cluster avg and PM%
    const clusterAvgVDay = clusterData.vDayPM || T.vDayPM || 5;
    const ratio = +vPerDay / Math.max(clusterAvgVDay, 1);
    let rating, ratingClass, ratingEmoji;
    if (ratio >= 0.95 && daysActive >= 12) { rating = 'Star Performer'; ratingClass = 'star'; ratingEmoji = '⭐'; }
    else if (ratio >= 0.75 || daysActive >= 10) { rating = 'Good / On Track'; ratingClass = 'ok'; ratingEmoji = '✅'; }
    else if (daysActive >= 5) { rating = 'Needs Improvement'; ratingClass = 'needs'; ratingEmoji = '⚠️'; }
    else { rating = 'Insufficient Data'; ratingClass = 'ok'; ratingEmoji = '📋'; }

    // Spark bars for day-by-day
    const days = r.days || [];
    const maxDay = Math.max(...days, 1);
    const sparkBars = days.slice(0, daysInMonth).map((v, i) => {
      const h = v > 0 ? Math.max(4, Math.round((v / maxDay) * 44)) : 2;
      const color = v === 0 ? '#E5E7EB' : v >= 8 ? '#10B981' : v >= 5 ? '#3B30F2' : '#A89FFA';
      return `<div class="bar" style="height:${h}px;background:${color}" title="Day ${i+1}: ${v} visits"></div>`;
    }).join('');

    // Weekend/rest days count (days with 0)
    const zeroDays = days.slice(0, daysInMonth).filter(v => v === 0).length;
    const activeDays = daysInMonth - zeroDays;

    return `
      <div class="sh-profile-card" style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div>
            <div class="sh-name">${r.name}</div>
            <div class="sh-meta">
              <span style="background:var(--accent-soft);color:var(--ss-navy);padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px">${r.cluster}</span>
              <span style="margin-left:8px">${r.type || 'SSE'}</span>
            </div>
          </div>
          <div>
            <span class="rating-pill ${ratingClass}">${ratingEmoji} ${rating}</span>
          </div>
        </div>

        <div class="kpi-band">
          <div class="kpi-mini">
            <div class="k-lbl">Total Visits MTD</div>
            <div class="k-val">${inr(total)}</div>
            <div class="k-sub">Primary + Secondary</div>
          </div>
          <div class="kpi-mini">
            <div class="k-lbl">PM / CM</div>
            <div class="k-val">${pm} / ${cm}</div>
            <div class="k-sub">${pmPct}% PM</div>
          </div>
          <div class="kpi-mini">
            <div class="k-lbl">Visits / Active Day</div>
            <div class="k-val">${vPerDay}</div>
            <div class="k-sub">Cluster avg: ${clusterAvgVDay.toFixed(1)}</div>
          </div>
          <div class="kpi-mini">
            <div class="k-lbl">Days Active</div>
            <div class="k-val">${daysActive}</div>
            <div class="k-sub">${zeroDays} zero-visit days</div>
          </div>
          <div class="kpi-mini">
            <div class="k-lbl">Secondary Visits</div>
            <div class="k-val">${secondary}</div>
            <div class="k-sub">${total > 0 ? ((secondary/total)*100).toFixed(0) : 0}% of total</div>
          </div>
          <div class="kpi-mini">
            <div class="k-lbl">Cluster CPV PM</div>
            <div class="k-val">${clusterCpvPM > 0 ? '₹' + inr(clusterCpvPM) : '—'}</div>
            <div class="k-sub">vs ₹${inr(overallAvgPM)} overall</div>
          </div>
        </div>

        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:6px">Day-wise visit pattern (${daysInMonth} days)</div>
          <div class="day-spark">${sparkBars}</div>
          <div style="font-size:10px;color:var(--ink-4);margin-top:4px;display:flex;gap:14px">
            <span style="color:#10B981">■ 8+ visits (great day)</span>
            <span style="color:#3B30F2">■ 5–7 visits</span>
            <span style="color:#A89FFA">■ 1–4 visits</span>
            <span style="color:#E5E7EB">■ No visits</span>
          </div>
        </div>

        <div class="ai-insight" style="margin-top:14px">
          <span class="ai-icon">💡</span>
          ${generateSHInsight(r, clusterData, T)}
        </div>
      </div>
    `;
  }).join('');

  if (rows.length > 10) {
    container.innerHTML += `<div style="text-align:center;padding:14px;color:var(--ink-3);font-size:13px">Showing top 10 of ${rows.length} results. Refine your search to narrow down.</div>`;
  }
}

function generateSHInsight(sh, cluster, T) {
  const total = sh.total || 0;
  const daysActive = sh.daysActive || 1;
  const vPerDay = total / daysActive;
  const clusterAvg = cluster.vDayPM || T.vDayPM || 5;
  const pm = sh.pm || 0;
  const cm = sh.cm || 0;
  const secondary = sh.secondary || 0;

  const parts = [];

  // Productivity vs cluster
  if (vPerDay >= clusterAvg * 1.1) {
    parts.push(`<strong>${sh.name.split(' ')[0]}</strong> is performing <strong>above cluster average</strong> at ${vPerDay.toFixed(1)} visits/day vs cluster avg of ${clusterAvg.toFixed(1)}.`);
  } else if (vPerDay < clusterAvg * 0.75) {
    parts.push(`<strong>${sh.name.split(' ')[0]}</strong> is <strong>below cluster average</strong> (${vPerDay.toFixed(1)} vs ${clusterAvg.toFixed(1)} v/day) — check scheduling and route density.`);
  } else {
    parts.push(`<strong>${sh.name.split(' ')[0]}</strong> is tracking close to the cluster average of ${clusterAvg.toFixed(1)} visits/day.`);
  }

  // Secondary visits
  if (secondary > total * 0.3) {
    parts.push(` High secondary visit share (${((secondary/total)*100).toFixed(0)}%) — may indicate they're covering multiple areas or supporting other SHs.`);
  }

  // CM heavy
  if (cm > pm && total > 10) {
    parts.push(` More CM than PM visits — this SH may be primarily allocated to corrective maintenance.`);
  }

  // Consistency check
  const days = sh.days || [];
  const nonZero = days.filter(v => v > 0);
  const avg = nonZero.length ? nonZero.reduce((a,b)=>a+b,0)/nonZero.length : 0;
  const variance = nonZero.reduce((s,v) => s + Math.pow(v - avg, 2), 0) / Math.max(nonZero.length, 1);
  if (Math.sqrt(variance) > avg * 0.4 && total > 20) {
    parts.push(` Visit counts show <strong>high day-to-day variance</strong> — inconsistent scheduling or demand spikes.`);
  } else if (total > 30) {
    parts.push(` Day-to-day visit pattern is <strong>consistent</strong> — good scheduling discipline.`);
  }

  return parts.join('') || 'Insufficient visit data to generate insights. Check if SH data is complete for this month.';
}

                  <th style="text-align:right;padding:10px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3)">CPV PM</th>
                  <th style="text-align:left;padding:10px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3)">Signal</th>
                </tr></thead>
                <tbody>
                  ${sortedByCpv.map((c, i) => {
                    const salaryPerSH = c.activeShB2C > 0 ? c.salaryCost / c.activeShB2C : 0;
                    const costPerSH = c.activeShB2C > 0 ? c.totalCost / c.activeShB2C : 0;
                    const cpvRatio = c.cpvPM / (T.cpvPM || 1);
                    const cpvClass = cpvRatio < 0.8 ? 'good' : cpvRatio > 1.3 ? 'bad' : '';
                    const signal = cpvRatio < 0.8
                      ? (c.vDayPM > T.vDayPM ? '🚀 High productivity + low salary' : '💰 Low cost structure')
                      : cpvRatio > 1.3
                        ? (c.vDayPM < T.vDayPM ? '🐢 Low visits/day + high cost' : '💸 High salary, needs more volume')
                        : '⚖️ Average performance';
                    return `<tr style="border-top:1px solid var(--line);background:${i%2?'var(--bg-2)':''}">
                      <td style="padding:8px 12px;font-weight:600">${c.cluster}</td>
                      <td style="text-align:right;padding:8px 12px">${c.activeShB2C||0}</td>
                      <td style="text-align:right;padding:8px 12px">${inr(c.pmDone||0)}</td>
                      <td style="text-align:right;padding:8px 12px">${(c.vDayPM||0).toFixed(2)}</td>
                      <td style="text-align:right;padding:8px 12px">₹${inrShort(salaryPerSH)}</td>
                      <td style="text-align:right;padding:8px 12px">₹${inrShort(costPerSH)}</td>
                      <td style="text-align:right;padding:8px 12px"><span class="chip ${cpvClass}">₹${inr(c.cpvPM)}</span></td>
                      <td style="padding:8px 12px;font-size:11.5px">${signal}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;

  document.getElementById('city-select').addEventListener('change', e => {
    if (e.target.value) renderCityDetail(e.target.value);
    document.getElementById('city-all-ranked').style.display = 'none';
  });

  document.getElementById('city-compare-all').addEventListener('click', () => {
    document.getElementById('city-detail').innerHTML = '';
    document.getElementById('city-all-ranked').style.display = 'block';
    document.getElementById('city-select').value = '';
  });
}

function renderCityDetail(clusterName) {
  const c = DATA.clusters.find(x => x.cluster === clusterName);
  if (!c) return;
  const T = DATA.totals;

  const salaryPerSH = c.activeShB2C > 0 ? c.salaryCost / c.activeShB2C : 0;
  const costPerSH   = c.activeShB2C > 0 ? c.totalCost / c.activeShB2C : 0;
  const allCpvs     = DATA.clusters.filter(x => x.cpvPM > 0).map(x => x.cpvPM).sort((a,b) => a-b);
  const rank        = allCpvs.findIndex(v => v >= c.cpvPM) + 1;
  const allVdays    = DATA.clusters.filter(x => x.vDayPM > 0).map(x => x.vDayPM).sort((a,b) => b-a);
  const vRank       = allVdays.findIndex(v => v <= c.vDayPM) + 1;

  // Factor analysis
  const factors = [
    {
      label: 'Team Size (SHs)',
      val: c.activeShB2C || 0,
      context: `${c.activeShB2C||0} B2C SHs active`,
      sentiment: (c.activeShB2C || 0) >= 10 ? 'pos' : (c.activeShB2C || 0) >= 5 ? 'neu' : 'neg',
      note: (c.activeShB2C||0) >= 15 ? 'Large team — more economies of scale' : (c.activeShB2C||0) < 5 ? 'Small team — high per-SH cost' : 'Mid-size team'
    },
    {
      label: 'Visit Productivity',
      val: (c.vDayPM||0).toFixed(2) + ' v/day',
      context: `Rank #${vRank} of ${allVdays.length}`,
      sentiment: c.vDayPM >= T.vDayPM * 1.1 ? 'pos' : c.vDayPM < T.vDayPM * 0.85 ? 'neg' : 'neu',
      note: c.vDayPM >= T.vDayPM * 1.1 ? 'Above average — likely dense routes or fewer floors' : c.vDayPM < T.vDayPM * 0.85 ? 'Below average — sparse routes, travel time, or plant size issues' : 'Near average'
    },
    {
      label: 'Salary per SH',
      val: '₹' + inrShort(salaryPerSH),
      context: `vs ₹${inrShort(T.salaryCost / Math.max(T.activeSH, 1))} overall avg`,
      sentiment: salaryPerSH > (T.salaryCost / Math.max(T.activeSH, 1)) * 1.15 ? 'neg' : salaryPerSH < (T.salaryCost / Math.max(T.activeSH, 1)) * 0.85 ? 'pos' : 'neu',
      note: salaryPerSH > (T.salaryCost / Math.max(T.activeSH, 1)) * 1.15 ? 'Higher salary per SH — metro labour costs' : 'In line with or below average'
    },
    {
      label: 'PM Completion Rate',
      val: c.pmDue > 0 ? ((c.pmDone / c.pmDue) * 100).toFixed(0) + '%' : 'N/A',
      context: `${inr(c.pmDone||0)} done of ${inr(c.pmDue||0)} due`,
      sentiment: c.pmDue > 0 && c.pmDone / c.pmDue >= 0.9 ? 'pos' : c.pmDue > 0 && c.pmDone / c.pmDue < 0.6 ? 'neg' : 'neu',
      note: c.pmDue > 0 ? (c.pmDone / c.pmDue >= 0.9 ? 'Strong completion' : 'Backlog exists — driving higher CPV') : 'No due visits recorded'
    },
    {
      label: 'Reimbursement',
      val: '₹' + inrShort(c.reimbCost||0),
      context: ((c.reimbCost||0) / (c.totalCost||1) * 100).toFixed(1) + '% of total cost',
      sentiment: (c.reimbCost||0) > (c.totalCost||1) * 0.15 ? 'neg' : 'pos',
      note: (c.reimbCost||0) > (c.totalCost||1) * 0.15 ? 'High reimbursement share — review travel distances' : 'Reimbursement under control'
    },
    {
      label: 'Bike Leasing',
      val: (c.numBikes||0) + ' bikes · ₹' + inrShort(c.bikeCost||0),
      context: c.numBikes > 0 ? `${((c.bikeCost||0)/(c.totalCost||1)*100).toFixed(1)}% of cost` : 'No bikes',
      sentiment: (c.numBikes||0) > 0 ? 'neg' : 'pos',
      note: c.numBikes > 0 ? 'Bike leasing adds recurring fixed cost' : 'No bike leasing cost — SHs use own vehicles'
    },
    {
      label: 'CM / Torque Load',
      val: inr(c.cm||0) + ' CM visits',
      context: `${(c.torqueCM||0)} Torque CM`,
      sentiment: (c.cm||0) > (c.pmDone||1) * 0.15 ? 'neg' : 'pos',
      note: (c.cm||0) > (c.pmDone||1) * 0.15 ? 'High CM load diluting PM efficiency' : 'CM load is manageable'
    },
    {
      label: 'New / Training SHs',
      val: (c.newSH||0) + ' new · ' + (c.training||0) + ' training',
      context: 'in the last 30 days',
      sentiment: (c.training||0) > (c.activeShB2C||1) * 0.2 ? 'neg' : 'neu',
      note: (c.training||0) > 0 ? `${c.training} SH(s) in training — not yet contributing to visits` : 'Full team operational'
    }
  ];

  const insight = generateCityInsight(c, T, factors);

  document.getElementById('city-detail').innerHTML = `
    <div class="city-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div>
          <h3 style="font-size:22px">${c.cluster} · City Intelligence Report</h3>
          <div class="city-meta">CPV PM Rank: #${rank} of ${allCpvs.length} cities · ${c.activeShB2C||0} B2C SHs · ₹${inr(c.cpvPM||0)} CPV PM</div>
        </div>
        <div style="text-align:right">
          <span class="chip ${c.cpvPM < T.cpvPM * 0.8 ? 'good' : c.cpvPM > T.cpvPM * 1.3 ? 'bad' : 'warn'}" style="font-size:13px;padding:6px 14px">
            ${c.cpvPM < T.cpvPM * 0.8 ? '✅ Efficient' : c.cpvPM > T.cpvPM * 1.3 ? '⚠️ High Cost' : '⚖️ Average'}
          </span>
        </div>
      </div>

      <div class="kpi-band">
        <div class="kpi-mini"><div class="k-lbl">CPV — PM</div><div class="k-val">₹${inr(c.cpvPM||0)}</div><div class="k-sub">vs ₹${inr(T.cpvPM)} avg</div></div>
        <div class="kpi-mini"><div class="k-lbl">CPV — Blended</div><div class="k-val">₹${inr(c.cpvBlended||0)}</div><div class="k-sub">all ticket types</div></div>
        <div class="kpi-mini"><div class="k-lbl">Total Cost</div><div class="k-val">₹${inrShort(c.totalCost||0)}</div><div class="k-sub">this month</div></div>
        <div class="kpi-mini"><div class="k-lbl">V/Day PM</div><div class="k-val">${(c.vDayPM||0).toFixed(2)}</div><div class="k-sub">vs ${(T.vDayPM||0).toFixed(2)} avg</div></div>
        <div class="kpi-mini"><div class="k-lbl">Cost / SH</div><div class="k-val">₹${inrShort(costPerSH)}</div><div class="k-sub">total cost ÷ SHs</div></div>
      </div>

      <div style="margin:20px 0 10px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3)">Performance Ingredients</div>
      <div class="factor-grid">
        ${factors.map(f => `
          <div class="factor-chip ${f.sentiment}">
            <div class="f-label">${f.label}</div>
            <div class="f-val">${f.val}</div>
            <div style="font-size:10.5px;color:var(--ink-3);margin-top:3px">${f.context}</div>
            <div style="font-size:11px;margin-top:5px;color:var(--ink-2)">${f.note}</div>
          </div>
        `).join('')}
      </div>

      <div class="ai-insight" style="margin-top:20px">
        <div style="font-weight:700;color:var(--ss-navy);margin-bottom:8px;font-size:13px">🧠 Intelligence Summary</div>
        ${insight}
      </div>
    </div>
  `;
}

function generateCityInsight(c, T, factors) {
  const lines = [];

  const cpvRatio = (c.cpvPM || 0) / (T.cpvPM || 1);
  const vRatio   = (c.vDayPM || 0) / (T.vDayPM || 1);
  const salaryPerSH = c.activeShB2C > 0 ? c.salaryCost / c.activeShB2C : 0;
  const overallSalaryPerSH = T.activeSH > 0 ? T.salaryCost / T.activeSH : 1;

  // Core analysis
  if (cpvRatio < 0.85) {
    lines.push(`<strong>${c.cluster} is one of the most cost-efficient clusters</strong> at ₹${inr(c.cpvPM)} CPV PM (${((1 - cpvRatio) * 100).toFixed(0)}% below average).`);
    if (vRatio > 1.1) lines.push(` The main driver is <strong>high visit productivity</strong> (${(c.vDayPM||0).toFixed(2)} v/day) — likely indicating dense solar installations, smaller plant sizes, or better route planning.`);
    if (salaryPerSH < overallSalaryPerSH * 0.9) lines.push(` <strong>Lower salary costs per SH</strong> (₹${inrShort(salaryPerSH)}) also contribute — possibly a Tier-2/3 city advantage.`);
    if ((c.numBikes||0) === 0) lines.push(` No bike leasing cost further reduces fixed overhead.`);
  } else if (cpvRatio > 1.3) {
    lines.push(`<strong>${c.cluster} has elevated CPV PM</strong> at ₹${inr(c.cpvPM)} (${((cpvRatio - 1) * 100).toFixed(0)}% above average).`);
    if (vRatio < 0.85) lines.push(` The biggest factor is <strong>low visit productivity</strong> (${(c.vDayPM||0).toFixed(2)} v/day) — this could reflect larger plant sizes, multi-floor homes, longer travel time between visits, or weather/ambient conditions slowing work.`);
    if (salaryPerSH > overallSalaryPerSH * 1.15) lines.push(` <strong>Higher salary per SH</strong> (₹${inrShort(salaryPerSH)} vs ₹${inrShort(overallSalaryPerSH)} avg) also contributes — typical in metro or high-density cities like Chennai or Bengaluru.`);
    if (c.pmDue > 0 && c.pmDone / c.pmDue < 0.7) lines.push(` Additionally, <strong>low PM completion</strong> (${((c.pmDone/c.pmDue)*100).toFixed(0)}%) means fixed costs are spread over fewer actual visits.`);
  } else {
    lines.push(`<strong>${c.cluster} is performing at near-average</strong> CPV PM (₹${inr(c.cpvPM)}).`);
    if (vRatio > 1.0) lines.push(` Visit productivity is a strength at ${(c.vDayPM||0).toFixed(2)} v/day.`);
  }

  // What the best can do
  if (cpvRatio > 1.2) {
    const bestCluster = DATA.clusters.filter(x => x.cpvPM > 0).sort((a,b) => a.cpvPM - b.cpvPM)[0];
    const theoreticalBest = (c.totalCost || 0) / Math.max(c.pmDone || 1, 1) * (bestCluster.vDayPM / Math.max(c.vDayPM || 1, 1));
    lines.push(` <strong>Improvement potential:</strong> if ${c.cluster} matches ${bestCluster ? bestCluster.cluster : 'the best cluster'}'s productivity of ${(bestCluster ? bestCluster.vDayPM : 0).toFixed(2)} v/day, estimated CPV PM could drop to ~₹${inr(theoreticalBest)}.`);
  }

  return lines.join('') || 'Select a cluster to generate analysis.';
}


// ═════════════════════════════════════════════════════════════════════════════
// TAB ROUTER
// ═════════════════════════════════════════════════════════════════════════════
// ── CLUSTER SH COSTS ─────────────────────────────────────────────────────────
let clusterSHState = { cluster: "", sort: "totalCost", asc: false };

function renderClusterSH() {
  const all = DATA.shLevel || [];
  if (!all.length) {
    document.getElementById("app").innerHTML = `
      <div class="section" style="margin-top:0">
        <div class="eye">Cluster → service heroes</div>
        <h2>Where the cost sits, SH by SH</h2>
        <div style="background:var(--warn-soft);border:1px solid var(--warn);border-radius:10px;padding:20px;color:#92400E;margin-top:20px">
          <b>SH-level data not loaded.</b> This view needs the per-SH feed (mastersheet + visits dump, fuzzy-matched). It works in preview mode. To make it work live, add a <code>readSHCluster_()</code> reader to WebApp.gs.
        </div>
      </div>`;
    return;
  }
  const clusters = [...new Set(all.map(r => r.cluster))].sort();
  if (!clusterSHState.cluster && clusters.length) clusterSHState.cluster = clusters[0];

  const html = `
    <div class="section" style="margin-top:0">
      <div class="eye">Cluster → service heroes</div>
      <h2>Where the cost sits, SH by SH</h2>
      <p class="lead">Pick a cluster to see every Service Hero in it with salary, visits done, and cost-per-visit. Sorted by total cost so the expensive / low-output SHs surface at the top. Use this to find who is driving a cluster's CPV up.</p>

      <div class="filter-bar" style="display:flex;gap:14px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:12px;color:var(--ink-3);font-weight:500">Cluster</label>
          <select id="csh-cluster" class="search" style="width:auto;min-width:200px">
            ${clusters.map(c => `<option value="${c}" ${c === clusterSHState.cluster ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <div id="csh-summary" style="margin-left:auto;font-size:12px;color:var(--ink-3);font-family:'JetBrains Mono',monospace"></div>
      </div>

      <div id="csh-kpi"></div>
      <div class="tbl-wrap" style="margin-top:18px">
        <div style="overflow-x:auto" id="csh-tbl"></div>
      </div>
    </div>
  `;
  document.getElementById("app").innerHTML = html;

  document.getElementById("csh-cluster").addEventListener("change", e => {
    clusterSHState.cluster = e.target.value;
    redrawClusterSH();
  });
  redrawClusterSH();
}

function redrawClusterSH() {
  const all = DATA.shLevel || [];
  const rows = all.filter(r => r.cluster === clusterSHState.cluster);

  // cluster aggregates
  const totalCost = rows.reduce((s,r) => s + (r.totalCost||0), 0);
  const totalVisits = rows.reduce((s,r) => s + (r.total||0), 0);
  const activeCount = rows.filter(r => (r.status||'').toLowerCase() === 'active').length;
  const zeroVisit = rows.filter(r => (r.total||0) === 0).length;
  const clusterCPV = totalVisits ? totalCost / totalVisits : 0;

  document.getElementById("csh-summary").textContent =
    `${rows.length} SHs · ${activeCount} active · ${inr(totalVisits)} visits · ₹${inrShort(totalCost)} cost`;

  document.getElementById("csh-kpi").innerHTML = `
    <div class="grid-4" style="margin-bottom:0">
      <div class="cost-tile"><div class="lbl">Cluster total cost</div><div class="val">₹${inrShort(totalCost)}</div><div class="pct">${rows.length} service heroes</div></div>
      <div class="cost-tile"><div class="lbl">Cluster CPV</div><div class="val">₹${inr(clusterCPV)}</div><div class="pct">cost ÷ visits</div></div>
      <div class="cost-tile"><div class="lbl">Total visits</div><div class="val">${inr(totalVisits)}</div><div class="pct">${activeCount} active SHs</div></div>
      <div class="cost-tile"><div class="lbl">Zero-visit SHs</div><div class="val" style="color:${zeroVisit > 0 ? 'var(--danger)' : 'var(--good)'}">${zeroVisit}</div><div class="pct">cost but no output</div></div>
    </div>
  `;

  // sort
  rows.sort((a,b) => {
    let va = a[clusterSHState.sort], vb = b[clusterSHState.sort];
    if (typeof va === "string") return clusterSHState.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    va = +va || 0; vb = +vb || 0;
    return clusterSHState.asc ? va - vb : vb - va;
  });

  const maxCost = Math.max(...rows.map(r => r.totalCost||0), 1);
  const cpvThreshold = clusterCPV * 1.5;

  const head = `<thead><tr>
    <th data-csh="name" style="text-align:left;padding:11px 14px;cursor:pointer">SH Name</th>
    <th data-csh="status" style="text-align:left;padding:11px 14px;cursor:pointer">Status</th>
    <th data-csh="team" style="text-align:left;padding:11px 14px;cursor:pointer">Team</th>
    <th data-csh="category" style="text-align:left;padding:11px 14px;cursor:pointer">Cat</th>
    <th data-csh="salary" style="text-align:right;padding:11px 14px;cursor:pointer">Salary</th>
    <th data-csh="toolkit" style="text-align:right;padding:11px 14px;cursor:pointer">Toolkit</th>
    <th data-csh="totalCost" style="text-align:right;padding:11px 14px;cursor:pointer">Total Cost</th>
    <th data-csh="pm" style="text-align:right;padding:11px 14px;cursor:pointer">PM</th>
    <th data-csh="cm" style="text-align:right;padding:11px 14px;cursor:pointer">CM</th>
    <th data-csh="total" style="text-align:right;padding:11px 14px;cursor:pointer">Visits</th>
    <th data-csh="cpv" style="text-align:right;padding:11px 14px;cursor:pointer">CPV</th>
  </tr></thead>`;

  const body = rows.map(r => {
    const isZero = (r.total||0) === 0;
    const highCpv = r.cpv > cpvThreshold && r.total > 0;
    const flag = isZero ? '<span class="chip bad">0 visits</span>'
               : highCpv ? '<span class="chip warn">high CPV</span>' : '';
    const inactive = (r.status||'').toLowerCase() !== 'active';
    const costBar = `<span class="barcell" style="width:50px"><i style="width:${((r.totalCost||0)/maxCost*100).toFixed(0)}%;background:${highCpv||isZero?'var(--danger)':'var(--accent)'}"></i></span>`;
    return `<tr style="${isZero||highCpv ? 'background:linear-gradient(90deg,var(--danger-soft) 0%,transparent 50%)' : ''}">
      <td style="text-align:left;font-weight:500">${r.name} ${flag}</td>
      <td style="text-align:left"><span style="color:${inactive?'var(--ink-3)':'var(--good)'};font-size:11px">${r.status||'—'}</span></td>
      <td style="text-align:left;font-size:11px"><span class="chip ${(r.team||'').toLowerCase()==='b2b'?'b2b':''}">${r.team||'—'}</span></td>
      <td style="text-align:left;color:var(--ink-3);font-size:11px">${r.category||'—'}</td>
      <td style="text-align:right">₹${inr(r.salary||0)}</td>
      <td style="text-align:right;color:var(--ink-3)">₹${inr(r.toolkit||0)}</td>
      <td style="text-align:right;font-weight:600">₹${inr(r.totalCost||0)}${costBar}</td>
      <td style="text-align:right">${r.pm||0}</td>
      <td style="text-align:right">${r.cm||0}</td>
      <td style="text-align:right;font-weight:600">${r.total||0}</td>
      <td style="text-align:right">${r.cpv > 0 ? '<span class="chip '+(highCpv?'bad':r.cpv<clusterCPV*0.7?'good':'')+'">₹'+inr(r.cpv)+'</span>' : '—'}</td>
    </tr>`;
  }).join("");

  document.getElementById("csh-tbl").innerHTML = `<table id="tbl">${head}<tbody>${body}</tbody></table>`;

  document.querySelectorAll('#csh-tbl th[data-csh]').forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.csh;
      if (clusterSHState.sort === k) clusterSHState.asc = !clusterSHState.asc;
      else { clusterSHState.sort = k; clusterSHState.asc = false; }
      redrawClusterSH();
    });
  });
}

const RENDER = { overview: renderOverview, quadrant: renderQuadrant, clusters: renderClusters, shpm: () => renderSHDaily('pm'), shall: () => renderSHDaily('all'), deepdive: renderDeepDive, cityiq: renderCityIQ, clustersh: renderClusterSH };
let currentTab = "overview";

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  destroyCharts();
  RENDER[name]();
}

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => switchTab(t.dataset.tab));
});
